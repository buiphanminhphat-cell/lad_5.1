<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Era Smart Digital Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('https://fonts.cdnfonts.com/s/14351/DS-DIGI.woff') format('woff');
        }
        
        body {
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-center;
            min-height: screen;
        }

        .digital-font {
            font-family: 'Digital', sans-serif;
            letter-spacing: 1px;
        }

        .lcd-frame {
            background: #f8fafc;
            border: 12px solid #cbd5e1;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), inset 0 2px 5px rgba(255,255,255,0.8);
            width: 420px;
            height: 420px;
            padding: 20px;
        }

        .lcd-screen {
            background: #eff6ff;
            border: 3px solid #94a3b8;
            border-radius: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.05);
        }

        .lcd-text-main {
            color: #334155;
        }

        .line-divider {
            height: 2px;
            background: #94a3b8;
            width: 95%;
            margin: 10px auto;
            opacity: 0.5;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }
        .blink { animation: blink 1s infinite; }

        /* Vị trí số thập phân nhỏ cho nhiệt độ */
        .temp-decimal-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 2px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="lcd-frame">
        <div class="lcd-screen">
            
            <!-- Hàng 1: Ngày tháng & Icons -->
            <div class="flex justify-between items-center px-2">
                <div class="flex flex-col">
                    <div class="flex gap-6 text-[9px] font-bold text-slate-500 uppercase tracking-tighter">
                        <span>DAY</span>
                        <span>MONTH</span>
                        <span>YEAR</span>
                    </div>
                    <div id="current-date" class="digital-font text-4xl lcd-text-main tracking-widest">25/08/2022</div>
                </div>
                <div class="flex gap-3 items-center text-slate-700">
                    <!-- Pin -->
                    <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 20H8V6H16V20ZM16.5 4H15V2H9V4H7.5C6.67 4 6 4.67 6 5.5V20.5C6 21.33 6.67 22 7.5 22H16.5C17.33 22 18 21.33 18 20.5V5.5C18 4.67 17.33 4H16.5Z" />
                    </svg>
                    <!-- Wifi -->
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3C7.31 3 3.07 4.9 0 8l12 13 12-13C20.93 4.9 16.69 3 12 3Z" />
                    </svg>
                </div>
            </div>

            <div class="line-divider"></div>

            <!-- Hàng 2: Nhiệt độ & Độ ẩm -->
            <div class="flex justify-around items-center flex-1">
                <!-- Cụm Nhiệt độ -->
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-slate-600 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <div class="flex items-start">
                        <span id="temp-integer" class="digital-font text-8xl lcd-text-main leading-none">26</span>
                        <div class="temp-decimal-container">
                            <span class="text-xl font-bold -mb-1">°C</span>
                            <span id="temp-decimal" class="digital-font text-4xl lcd-text-main leading-none">8</span>
                        </div>
                    </div>
                </div>

                <!-- Cụm Độ ẩm -->
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-slate-600 mr-1" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 21.5C8.41 21.5 5.5 18.59 5.5 15C5.5 12.38 7.55 9.12 12 4.41C16.45 9.12 18.5 12.38 18.5 15C18.5 18.59 15.59 21.5 12 21.5ZM12 6.67C9.07 10.05 7.5 12.78 7.5 15C7.5 17.48 9.52 19.5 12 19.5C14.48 19.5 16.5 17.48 16.5 15C16.5 12.78 14.93 10.05 12 6.67Z" />
                    </svg>
                    <div class="flex items-baseline">
                        <span id="humi-value" class="digital-font text-8xl lcd-text-main leading-none">65</span>
                        <span class="text-3xl font-bold ml-1">%</span>
                    </div>
                </div>
            </div>

            <div class="line-divider"></div>

            <!-- Hàng 3: Giờ lớn -->
            <div class="flex justify-center items-center py-4">
                <div class="digital-font text-[120px] lcd-text-main flex items-center leading-none tracking-tighter">
                    <span id="time-hh">08</span>
                    <span class="blink mx-1" style="transform: translateY(-8px);">:</span>
                    <span id="time-mm">26</span>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.unpkg.com/@eoh-jsc/era-widget@1.1.3/dist/era-widget.js" onload="initEraWidget()"></script>
    <script>
        let eraWidget = null;
        let config = null;

        // Hàm xóa dấu tiếng Việt để so sánh tên chính xác
        function removeVietnameseTones(str) {
            return str.normalize('NFD')
                      .replace(/[\u0300-\u036f]/g, '')
                      .replace(/đ/g, 'd').replace(/Đ/g, 'D')
                      .toLowerCase()
                      .trim();
        }

        function updateClock() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            document.getElementById('current-date').innerText = `${d}/${m}/${y}`;
            
            document.getElementById('time-hh').innerText = String(now.getHours()).padStart(2, '0');
            document.getElementById('time-mm').innerText = String(now.getMinutes()).padStart(2, '0');
        }

        updateClock();
        setInterval(updateClock, 1000);

        function initEraWidget() {
            const checkExist = setInterval(function() {
                if (typeof EraWidget !== 'undefined') {
                    clearInterval(checkExist);
                    startWidget();
                }
            }, 100);
        }

        function startWidget() {
            try {
                eraWidget = new EraWidget();
                
                eraWidget.onConfiguration((configuration) => {
                    config = configuration;
                });

                eraWidget.onValues((values) => {
                    if (!config || !config.entities) return;
                    
                    config.entities.forEach(entity => {
                        const value = values[entity.id]?.value;
                        if (value === undefined) return;

                        const entityNameNormalized = removeVietnameseTones(entity.name || "");
                        
                        // Nhận diện Nhiệt độ (V2 hoặc tên "nhiet do")
                        if (entity.virtualPin === 'V2' || entityNameNormalized.includes('nhiet do')) {
                            const valNum = parseFloat(value).toFixed(1);
                            const parts = valNum.split('.');
                            document.getElementById('temp-integer').innerText = parts[0];
                            document.getElementById('temp-decimal').innerText = parts[1] || '0';
                        }

                        // Nhận diện Độ ẩm (V3 hoặc tên "do am")
                        if (entity.virtualPin === 'V3' || entityNameNormalized.includes('do am')) {
                            document.getElementById('humi-value').innerText = Math.round(value);
                        }
                    });
                });

                eraWidget.ready();
            } catch (e) {
                console.error("EraWidget Start Error:", e);
            }
        }
    </script>
</body>
</html>
