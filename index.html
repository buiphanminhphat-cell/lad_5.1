<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Display</title>
<style>
    body {
        background: #dfe6ee;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    .card {
        width: 420px;
        background: linear-gradient(145deg, #eef3f8, #d6dde5);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 10px 10px 20px rgba(0,0,0,0.2),
                    -10px -10px 20px rgba(255,255,255,0.7);
    }

    .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: #333;
    }

    .date {
        font-size: 28px;
        font-weight: bold;
    }

    .icons {
        font-size: 20px;
    }

    hr {
        margin: 15px 0;
        border: none;
        border-top: 1px solid #aaa;
    }

    .middle {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .temp {
        font-size: 50px;
    }

    .humidity {
        font-size: 50px;
    }

    .bottom {
        text-align: center;
        font-size: 70px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="card">
    <div class="top">
        <div>
            <div>DAY &nbsp;&nbsp;&nbsp; MONTH &nbsp;&nbsp;&nbsp; YEAR</div>
            <div class="date">25/08/2022</div>
        </div>
        <div class="icons">📶 🔋</div>
    </div>

    <hr>

    <div class="middle">
        <div class="temp">🌡️ 26.8°C</div>
        <div class="humidity">💧 65%</div>
    </div>

    <hr>

    <div class="bottom">08:26</div>
</div>

</body>
</html>
