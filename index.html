<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Era Smart Digital Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('https://fonts.cdnfonts.com/s/14351/DS-DIGI.woff') format('woff');
        }
        
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #d1d5db 100%);
        }

        .digital-font {
            font-family: 'Digital', sans-serif;
            letter-spacing: 2px;
        }

        .lcd-container {
            background: rgba(224, 242, 254, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 10px 15px -3px rgba(0, 0, 0, 0.1),
                0 4px 6px -2px rgba(0, 0, 0, 0.05),
                inset 0 2px 4px rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            max-width: 450px;
            width: 100%;
            aspect-ratio: 1/1;
        }

        .inner-screen {
            background: #dbeafe;
            border-radius: 16px;
            border: 4px solid #94a3b8;
            position: relative;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.05);
        }

        .lcd-text {
            color: #334155;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .separator-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #64748b, transparent);
            width: 85%;
            margin: 0 auto;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .blink-colon {
            animation: blink 1s infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="lcd-container p-4">
        <div class="inner-screen h-full flex flex-col p-6 overflow-hidden">
            
            <!-- Header: Date & Status -->
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col">
                    <div class="flex gap-8 text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">
                        <span>Day</span>
                        <span>Month</span>
                        <span>Year</span>
                    </div>
                    <div id="current-date" class="digital-font text-3xl lcd-text">--/--/----</div>
                </div>
                
                <div class="flex gap-4 items-center pt-2 text-slate-600">
                    <!-- Battery -->
                    <div class="relative w-8 h-4 border-2 border-slate-600 rounded-sm">
                        <div class="absolute inset-0 bg-slate-600 m-0.5 w-[80%]"></div>
                        <div class="absolute -right-1.5 top-0.5 w-1 h-2 bg-slate-600 rounded-r-sm"></div>
                    </div>
                    <!-- WiFi -->
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
                    </svg>
                </div>
            </div>

            <div class="separator-line"></div>

            <!-- Sensors: Temp & Humidity -->
            <div class="flex-1 flex items-center justify-between py-6">
                <!-- Temp -->
                <div class="flex flex-col items-center">
                    <div class="flex items-end">
                        <svg class="w-8 h-8 text-red-400 mr-1 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <span id="temp-value" class="digital-font text-7xl lcd-text leading-none">--.</span>
                        <div class="flex flex-col">
                            <span class="text-xl font-bold text-slate-700">°C</span>
                            <span id="temp-decimal" class="digital-font text-3xl lcd-text">-</span>
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase mt-1">Temperature</span>
                </div>

                <!-- Humidity -->
                <div class="flex flex-col items-center">
                    <div class="flex items-end">
                        <svg class="w-8 h-8 text-blue-400 mr-1 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                        </svg>
                        <span id="humi-value" class="digital-font text-7xl lcd-text leading-none">--</span>
                        <span class="text-3xl font-bold text-slate-700 ml-1 mb-1">%</span>
                    </div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase mt-1">Humidity</span>
                </div>
            </div>

            <div class="separator-line"></div>

            <!-- Time Display -->
            <div class="flex-1 flex items-center justify-center pt-4">
                <div class="digital-font text-[110px] lcd-text flex items-center tracking-tighter">
                    <span id="time-hh">--</span>
                    <span class="blink-colon mx-1" style="margin-top: -15px;">:</span>
                    <span id="time-mm">--</span>
                </div>
            </div>
            
            <div class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">
                Era Dashboard System
            </div>
        </div>
    </div>

    <!-- Cải thiện việc tải script với onload callback -->
    <script src="https://www.unpkg.com/@eoh-jsc/era-widget@1.1.3/dist/era-widget.js" onload="initEraWidget()"></script>
    <script>
        let eraWidget = null;
        let config = null;

        function updateClock() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.innerText = `${d}/${m}/${y}`;
            
            const hhEl = document.getElementById('time-hh');
            const mmEl = document.getElementById('time-mm');
            if (hhEl) hhEl.innerText = String(now.getHours()).padStart(2, '0');
            if (mmEl) mmEl.innerText = String(now.getMinutes()).padStart(2, '0');
        }

        // Luôn chạy đồng hồ độc lập với SDK
        updateClock();
        setInterval(updateClock, 1000);

        function initEraWidget() {
            // Kiểm tra EraWidget định kỳ để tránh race condition
            const checkExist = setInterval(function() {
                if (typeof EraWidget !== 'undefined') {
                    clearInterval(checkExist);
                    startWidget();
                }
            }, 100);
        }

        function startWidget() {
            try {
                eraWidget = new EraWidget();
                
                eraWidget.onConfiguration((configuration) => {
                    config = configuration;
                });

                eraWidget.onValues((values) => {
                    if (!config) return;
                    
                    config.entities.forEach(entity => {
                        const value = values[entity.id]?.value;
                        if (value === undefined) return;

                        if (entity.name.toLowerCase().includes('temp') || entity.id.includes('temp')) {
                            const valNum = parseFloat(value).toFixed(1);
                            const parts = valNum.split('.');
                            const valEl = document.getElementById('temp-value');
                            const decEl = document.getElementById('temp-decimal');
                            if (valEl) valEl.innerText = parts[0] + '.';
                            if (decEl) decEl.innerText = parts[1] || '0';
                        }

                        if (entity.name.toLowerCase().includes('humi') || entity.id.includes('humi')) {
                            const humiEl = document.getElementById('humi-value');
                            if (humiEl) humiEl.innerText = Math.round(value);
                        }
                    });
                });

                eraWidget.ready();
            } catch (e) {
                console.error("Error starting EraWidget:", e);
            }
        }

        // Fallback trong trường hợp onload không kích hoạt (ví dụ: script đã cache)
        window.addEventListener('load', () => {
            if (!eraWidget && typeof EraWidget !== 'undefined') {
                initEraWidget();
            }
        });
    </script>
</body>
</html>
