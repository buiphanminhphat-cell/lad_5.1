<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart IoT</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #dfe6e9;
    font-family: Arial;
}

/* CARD */
#card {
    width: 320px;
    padding: 20px;
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* DATE */
#date {
    font-size: 14px;
    margin-bottom: 10px;
}

/* INFO */
#info {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
}

.value {
    font-size: 20px;
}

/* CLOCK */
#clock {
    font-size: 42px;
    font-weight: bold;
    margin: 15px 0;
}

/* LED */
#statusLed {
    margin: 10px 0;
    font-size: 14px;
}

/* BUTTON */
#control {
    margin-top: 10px;
}

.btn {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    margin: 5px;
    color: white;
}

#turnOn { background: green; }
#turnOff { background: red; }
</style>
</head>

<body>

<div id="card">

    <!-- DATE -->
    <div id="date">10/04/2026</div>

    <!-- SENSOR -->
    <div id="info">
        <div id="nhietDo" class="value">🌡 -- °C</div>
        <div id="doAm" class="value">💧 -- %</div>
    </div>

    <!-- CLOCK -->
    <div id="clock">00:00</div>

    <!-- LED STATUS -->
    <div id="statusLed">Đang tải...</div>

    <!-- CONTROL -->
    <div id="control">
        <button id="turnOn" class="btn">BẬT LED</button>
        <button id="turnOff" class="btn">TẮT LED</button>
    </div>

</div>

<!-- ERA -->
<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>

<script>
// ===== CLOCK =====
setInterval(() => {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById("clock").innerText = h + ":" + m;
}, 1000);

// ===== DOM =====
const temp = document.getElementById('nhietDo');
const humi = document.getElementById('doAm');
const turnOn = document.getElementById('turnOn');
const turnOff = document.getElementById('turnOff');
const statusLed = document.getElementById('statusLed');

// ===== STATE =====
let configTemp = null;
let configHumi = null;
let configLed = null;
let actions = [];
let ledState = null;

// ===== ERA INIT =====
const eraWidget = new EraWidget();

eraWidget.init({
  needRealtimeConfigs: true,
  needActions: true,

  maxRealtimeConfigsCount: 3,
  maxActionsCount: 2,

  onConfiguration: (config) => {
    if (!config || !config.realtime_configs) return;

    configTemp = config.realtime_configs[0] || null;
    configHumi = config.realtime_configs[1] || null;
    configLed  = config.realtime_configs[2] || null;

    actions = config.actions || [];
  },

  onValues: (values) => {
    if (!values) return;

    if (configTemp && values[configTemp.id]) {
      temp.innerText = "🌡 " + values[configTemp.id].value + " °C";
    }

    if (configHumi && values[configHumi.id]) {
      humi.innerText = "💧 " + values[configHumi.id].value + " %";
    }

    if (configLed && values[configLed.id]) {
      const newLed = values[configLed.id].value;

      if (ledState !== newLed) {
        ledState = newLed;

        statusLed.innerText = newLed == 1 
          ? "💡 Đèn đang bật" 
          : "🔌 Đèn đang tắt";
      }
    }
  }
});

// ===== BUTTON =====
turnOn.addEventListener("click", () => {
  if (actions[0]) eraWidget.triggerAction(actions[0].action, null);
});

turnOff.addEventListener("click", () => {
  if (actions[1]) eraWidget.triggerAction(actions[1].action, null);
});
</script>

</body>
</html>
